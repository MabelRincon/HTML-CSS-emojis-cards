<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Emojis CSS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="wrapper">
        <h1>Garín, the asturian snail.</h1>
        <div class="container">
            <div class="toggle color1">
                <p class="text">Green food<span class="emoji">🌿</span></p>
            </div>
            <div class="toggle color2">
                <p class="emoji"><span>👫</span></p>
            </div>
            <div class="toggle color3">
                <p class="emoji">🍇</span></p>
            </div>
            <div class="toggle color1">
                <p class="text">So active at night<span class="emoji">🌛</span></p>
            </div>
            <div class="toggle color2">
                <p class="emoji">🫰</span></p>
            </div>
            <div class="toggle color4">
                <p class="text">I'm Garín<span class="emoji">🐌</span></p>
            </div>
            <div class="toggle color2">
                <p class="text"><span class="emoji">🥬</span>Found in a lettuce</p>
            </div>
            <div class="toggle color3">
                <p class="emoji"><span>❤️</span></p>
            </div>
            <div class="toggle color1">
                <p class="emoji">🥕</span></p>
            </div>
            <div class="toggle color1">
                <p class="emoji">🫐</span></p>
            </div>
            <div class="toggle color4">
                <p class="text">Love eating tangerines<span class="emoji">🍊</span></p>
            </div>
            <div class="toggle color3">
                <p class="text">Winter means hibernation<span class="emoji">💤</span></p>
            </div>
            <div class="toggle color4">
                <p class="text">Needs + hydration <span class="emoji">💦</span></p>
            </div>
            <div class="toggle color2">
                <p class="text">He loves to eat eggshell!<span class="emoji">🥚</span></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
